<div class="topbar home-topbar">
  <div class="container nav">
    <a class="brand-lockup home-brand" href="../index.html">

<section class="section">
  <div class="container"><div id="storageWarning"></div></div>
  <div class="container auth-wrap">
    <div class="panel">
      <div class="kicker">Create photographer account</div>
      <h1 class="page-title" style="margin-top:10px">Register your studio.</h1>
      <p class="lead">In the real site, approved photographers can see professional pricing while guests and couples cannot.</p>
      <form id="registerForm">
        <div class="form-grid">
          <div class="field"><label>Studio name</label><input name="studioName" required></div>
          <div class="field"><label>Photographer name</label><input name="photographerName" required></div>
          <div class="field"><label>Email</label><input name="email" type="email" required></div>
          <div class="field"><label>Password</label><input name="password" type="password" required></div>
          <div class="field"><label>Phone</label><input name="phone"></div>
          <div class="field"><label>Country</label><input name="country"></div>
          <div class="field" style="grid-column:1/-1"><label>Website / Instagram</label><input name="website"></div>
        </div>
        <div class="hero-actions"><button type="submit">Create account</button><a class="btn secondary" href="login.html">Already have an account</a></div>
      </form>
      <div id="registerMsg" style="margin-top:16px"></div>
    </div>
    <div class="side-visual" style="background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1200&q=80')"></div>
  </div>
</section>

</body>
